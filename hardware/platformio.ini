; ========================================
; PlatformIO Project Configuration File
; Smart Study Desk Monitor - ESP32
; ========================================

[platformio]
; Dossier source par défaut
src_dir = src
; Dossier des bibliothèques
lib_dir = lib
; Dossier de build
build_dir = .pio/build
; Cache
libdeps_dir = .pio/libdeps

; ========================================
; Configuration Environnement ESP32
; ========================================
[env:esp32dev]
; Plateforme
platform = espressif32

; Type de carte
board = esp32dev

; Framework
framework = arduino

; ========================================
; Port série (décommentez selon votre OS)
; ========================================
; Windows
; upload_port = COM3
; monitor_port = COM3

; Linux
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0

; macOS
; upload_port = /dev/cu.usbserial-*
; monitor_port = /dev/cu.usbserial-*

; ========================================
; Vitesse de communication
; ========================================
; Vitesse de téléversement (plus rapide = mieux)
upload_speed = 921600

; Vitesse du moniteur série
monitor_speed = 115200

; Filtre pour moniteur série (affiche tout)
monitor_filters = 
    default
    time
    colorize

; ========================================
; Bibliothèques requises
; ========================================
lib_deps = 
    ; JSON pour communication Firebase
    bblanchon/ArduinoJson@^6.21.3
    
    ; Capteur de luminosité BH1750
    claws/BH1750@^1.3.0
    
    ; Capteur température/humidité DHT22
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.9

; ========================================
; Options de compilation
; ========================================
build_flags = 
    ; Niveau de debug (0=None, 1=Error, 2=Warn, 3=Info, 4=Debug, 5=Verbose)
    -DCORE_DEBUG_LEVEL=3
    
    ; Active les couleurs dans les logs
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    
    ; Taille du buffer pour les logs
    -DCONFIG_LOG_DEFAULT_LEVEL=3
    
    ; Optimisation
    -O2
    
    ; Définit la taille du stack
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192

; ========================================
; Options avancées
; ========================================
; Désactive le watchdog pour debug
; build_flags = ${env:esp32dev.build_flags} -DCONFIG_ESP_TASK_WDT=0

; Flash mode (pour compatibilité)
board_build.flash_mode = dio

; Fréquence flash
board_build.f_flash = 40000000L

; Fréquence CPU
board_build.f_cpu = 240000000L

; Taille de la partition
board_build.partitions = default.csv

; ========================================
; Environnement de développement
; ========================================
[env:esp32dev_debug]
extends = env:esp32dev
build_type = debug

; Flags supplémentaires pour debug
build_flags = 
    ${env:esp32dev.build_flags}
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_CORE
    -DCORE_DEBUG_LEVEL=5

; ========================================
; Environnement de production
; ========================================
[env:esp32dev_release]
extends = env:esp32dev
build_type = release

; Optimisation maximale pour production
build_flags = 
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=1
    -Os  ; Optimisation pour la taille

; ========================================
; Tâches personnalisées
; ========================================
; Upload OTA (Over The Air)
; Décommentez et configurez si vous utilisez OTA
; [env:esp32dev_ota]
; extends = env:esp32dev
; upload_protocol = espota
; upload_port = 192.168.1.XXX
; upload_flags =
;     --port=3232
;     --auth=your_password

; ========================================
; Scripts personnalisés
; ========================================
; Script exécuté avant la compilation
; extra_scripts = pre:scripts/pre_build.py

; Script exécuté après la compilation
; extra_scripts = post:scripts/post_build.py

; ========================================
; Options de test
; ========================================
test_framework = unity
test_build_project_src = true

; ========================================
; Commentaires et notes
; ========================================
; 
; Pour compiler : pio run
; Pour téléverser : pio run --target upload
; Pour moniteur série : pio device monitor
; Pour nettoyer : pio run --target clean
; 
; Documentation complète :
; https://docs.platformio.org/en/latest/projectconf/
; 
; ========================================
